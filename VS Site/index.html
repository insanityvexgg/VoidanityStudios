<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidanity Studios</title>
    <style>
        /* --- EASY EDIT ZONE: COLORS & FONTS --- */
        :root {
            --text-color: #ffffff;
            --accent-color: #ba68c8; /* Light purple glow */
            --galactic-gradient: linear-gradient(135deg, #0d1b2a, #1b263b, #415a77, #3a0ca3, #7209b7);
            --widget-bg: rgba(255, 255, 255, 0.05);
            --widget-hover: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--galactic-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--galactic-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #loader::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 7, 30, 0.4);
            z-index: -1;
        }

        .loader-content {
            text-align: center;
        }

        .studio-logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(186, 104, 200, 0.3);
            animation: pulse 2s infinite alternate;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 0.8s linear infinite;
        }

        /* --- MAIN WEBSITE LAYOUT --- */
        #main-content {
            opacity: 0;
            transition: opacity 1s ease 0.4s;
            padding: 40px;
            max-width: 1200px;
            margin: 5vh auto;
            background: rgba(11, 7, 30, 0.75); 
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
            margin-bottom: 40px;
        }

        .main-logo {
            max-width: 130px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(186, 104, 200, 0.2);
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 1.1rem;
            color: #b0a8b9;
            margin-top: 0;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            text-align: left;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* --- POSTS SECTION --- */
        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            background: var(--widget-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 12px;
            transition: transform 0.2s, background 0.2s;
        }

        .post-card:hover {
            transform: translateY(-2px);
            background: var(--widget-hover);
        }

        .post-card h2 {
            margin-top: 0;
            font-size: 1.6rem;
            color: #e0dced;
        }

        .post-meta {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        .read-more-btn {
            display: inline-block;
            margin-top: 15px;
            color: #ffffff;
            background: #7209b7;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .read-more-btn:hover {
            background: #3a0ca3;
        }

        /* --- SIDEBAR & SOCIAL WIDGETS --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .widget {
            background: var(--widget-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
        }

        .widget h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            transition: background 0.2s, transform 0.2s;
        }

        .social-link:last-child {
            margin-bottom: 0;
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .social-link:hover {
            transform: translateX(3px);
        }

        .youtube { background: #ff0000; }
        .youtube:hover { background: #cc0000; }
        .discord { background: #5865F2; }
        .discord:hover { background: #4752C4; }
        .patreon { background: #FF424D; }
        .patreon:hover { background: #E63B44; }

        /* --- ANIMATIONS --- */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(0.96); } 100% { transform: scale(1.04); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <img src="logo.png" alt="Voidanity Studios Logo" class="studio-logo">
            <div class="spinner"></div>
        </div>
    </div>

    <div id="main-content">
        <header>
            <img src="logo.png" alt="Voidanity Studios" class="main-logo">
            <h1>Voidanity Studios</h1>
            <p class="tagline">Custom Mods & Experiences</p>
        </header>
        
        <div class="content-grid">
            <main class="posts-container" id="dynamic-posts">
                <p style="color: #b0a8b9;">Scanning the void for projects...</p>
            </main>

            <aside class="sidebar">
                <div class="widget">
                    <h3>Join the Community</h3>
                    
                    <a id="yt-widget" href="#" target="_blank" class="social-link youtube">
                        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                        YouTube
                    </a>

                    <a id="discord-widget" href="#" target="_blank" class="social-link discord">
                        <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.041.001-.09-.041-.106a13.094 13.094 0 0 1-1.873-.894.077.077 0 0 1-.008-.128c.126-.093.252-.19.372-.287a.075.075 0 0 1 .077-.011c3.92 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .078.009c.12.099.246.195.373.289a.077.077 0 0 1-.006.127 12.298 12.298 0 0 1-1.873.894.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.156 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.156 2.418z"/></svg>
                        Discord
                    </a>

                    <a id="patreon-widget" href="#" target="_blank" class="social-link patreon">
                        <svg viewBox="0 0 24 24"><path d="M0 .48v23.04h4.22V.48zm15.385 0c-4.764 0-8.623 3.859-8.623 8.622 0 4.764 3.859 8.623 8.623 8.623 4.764 0 8.622-3.859 8.622-8.623 0-4.763-3.858-8.622-8.622-8.622z"/></svg>
                        Patreon
                    </a>
                </div>
            </aside>
        </div>
    </div>

    <script>
        /* ==========================================
           * EASY CONFIG ZONE: PASTE YOUR LINKS HERE *
           ========================================== */
        const SOCIAL_LINKS = {
            youtube: "https://www.youtube.com/@YourChannel",
            discord: "https://discord.gg/YourInviteCode",
            patreon: "https://www.patreon.com/YourPage"
        };

        // Put your actual GitHub details here so it can scan the folder automatically!
        const GITHUB_USER = "YourGitHubUsername"; 
        const GITHUB_REPO = "YourRepositoryName";
        /* ========================================== */

        // Inject Social Links
        document.getElementById('yt-widget').href = SOCIAL_LINKS.youtube;
        document.getElementById('discord-widget').href = SOCIAL_LINKS.discord;
        document.getElementById('patreon-widget').href = SOCIAL_LINKS.patreon;

        // Auto Fetcher for Posts folder from GitHub
        async function fetchPostsFromGitHub() {
            const container = document.getElementById('dynamic-posts');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts`);
                if (!response.ok) throw new Error("Folder structural read failed");
                
                const files = await response.json();
                const htmlFiles = files.filter(file => file.name.endsWith('.html'));
                
                if (htmlFiles.length === 0) {
                    container.innerHTML = "<p style='color: #b0a8b9;'>No project files found inside the posts directory.</p>";
                    return;
                }

                container.innerHTML = ""; // Clear loader text

                htmlFiles.forEach(file => {
                    // Converts file names like "my-first-mod.html" -> "My First Mod"
                    const cleanTitle = file.name
                        .replace('.html', '')
                        .replace(/[-_]/g, ' ')
                        .replace(/\b\w/g, c => c.toUpperCase());

                    const article = document.createElement('article');
                    article.className = 'post-card';
                    article.innerHTML = `
                        <h2>${cleanTitle}</h2>
                        <div class="post-meta">Mod Project</div>
                        <p>Click below to explore download mirrors, changelogs, and asset configurations for ${cleanTitle}.</p>
                        <a href="${file.path}" class="read-more-btn">View Project</a>
                    `;
                    container.appendChild(article);
                });

            } catch (err) {
                console.warn("GitHub dynamic load failed (likely running locally):", err.message);
                container.innerHTML = `
                    <div class="post-card">
                        <h2>Running Locally Detect Mode</h2>
                        <p style="margin-bottom:0;">GitHub automatic folder scanning only functions when deployed online. To check layouts locally, use the sample link manually: <br><br><a href="posts/sample-mod.html" class="read-more-btn">Local Test Link</a></p>
                    </div>`;
            }
        }

        // Fader Engine
        window.addEventListener('load', () => {
            fetchPostsFromGitHub();
            
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            mainContent.style.opacity = '1';
        });
    </script>
</body>
</html>
